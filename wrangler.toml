name = "firstpen-waitlist-api"
main = "src/index.js"
compatibility_date = "2026-06-10"

# 静的ファイル（LP）。/ や /waitlist.html はここから配信される。
[assets]
directory = "./public"
binding = "ASSETS"

# 保存先データベース（Cloudflare D1）。外部キー不要、Workerからバインディングで直結。
[[d1_databases]]
binding = "DB"
database_name = "firstpen-waitlist"
database_id = "db8554eb-6085-4973-a301-37b9cee64054"

[vars]
WAITLIST_LIMIT = "300"
