<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特定商取引法に基づく表記 | AI BASE</title>

  <meta name="robots" content="noindex">

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#F0F4FF; --white:#FFFFFF; --navy:#0F172A;
      --blue:#2563EB; --gray:#475569; --border:#E2E8F0;
      --sh:0 2px 16px rgba(15,23,42,.08);
    }
    body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--navy); line-height:1.85; }
    nav { background:var(--white); border-bottom:1px solid var(--border); }
    nav .wrap { max-width:880px; margin:0 auto; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; }
    .nav-logo { font-weight:900; font-size:20px; color:var(--navy); text-decoration:none; letter-spacing:.5px; }
    .nav-back { font-size:14px; color:var(--blue); text-decoration:none; font-weight:700; }
    .wrap { max-width:880px; margin:0 auto; padding:0 24px; }
    main { padding:56px 0 80px; }
    h1 { font-size:28px; font-weight:900; margin-bottom:14px; }
    .lead { color:var(--gray); font-size:15px; margin-bottom:36px; }
    .card { background:var(--white); border:1px solid var(--border); border-radius:18px; box-shadow:var(--sh); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:20px 24px; border-bottom:1px solid var(--border); font-size:15px; vertical-align:top; }
    tr:last-child th, tr:last-child td { border-bottom:none; }
    th { width:200px; background:#F8FAFF; font-weight:700; color:var(--navy); }
    td { color:var(--gray); }
    td a { color:var(--blue); word-break:break-all; }
    .note { margin-top:28px; font-size:13px; color:var(--gray); line-height:1.9; }
    footer { text-align:center; padding:32px 24px; font-size:13px; color:var(--gray); border-top:1px solid var(--border); }
    @media (max-width:620px) {
      th, td { display:block; width:auto; }
      th { border-bottom:none; padding-bottom:4px; }
      td { padding-top:4px; }
      tr { border-bottom:1px solid var(--border); display:block; }
      tr:last-child { border-bottom:none; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="wrap">
      <a href="./waitlist.html" class="nav-logo">AI BASE</a>

      <div class="card">
        <table>
          <tbody>
            <tr>
              <th>運営会社</th>
              <td>株式会社ファーストペンギン</td>
            </tr>

              <td>〒162-0846<br>東京都新宿区市谷左内町21番地 市谷左内坂ビル1階</td>
            </tr>
            <tr>

              <td><a href="https://first-penguin.co.jp/contact/privacypolicy" target="_blank" rel="noopener">https://first-penguin.co.jp/contact/privacypolicy</a></td>

  <footer>
    © 2026 AI BASE / 株式会社ファーストペンギン
